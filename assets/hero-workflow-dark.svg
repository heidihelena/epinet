<title id="hero-title">EpiNet evaluation architecture</title>
<desc id="hero-desc">Data becomes a graph and feature space; splitting with baselines and a permutation null feeds two parallel paths — calibration and performance, and contestability — which join in a model card with provenance.</desc>
