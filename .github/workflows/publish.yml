name: Publish to PyPI

# Publishes the `vahtian-epinet` distribution to PyPI via Trusted Publishing
# (OIDC, no API token) when a GitHub Release is published. Register the pending
# publisher on PyPI as: project vahtian-epinet, owner heidihelena, repo epinet,
# workflow publish.yml, environment pypi.
#
# Triggers are limited to `release: published` and a manual `workflow_dispatch`.
# A `push: tags` trigger was removed because creating a GitHub Release also
# pushes its tag, which fired this workflow twice for the same version — the
# second upload then failed with PyPI's immutable "File already exists" (400).
# `skip-existing: true` below additionally turns a re-publish of an
# already-released version into a no-op instead of a failure.

on:
  release:
    types: [published]
  workflow_dispatch:  # manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # re-publishing an existing version is a no-op, not a failure
