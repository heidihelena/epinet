name: Publish to PyPI

# Publishes the `vahtian-epinet` distribution to PyPI via Trusted Publishing
# (OIDC, no API token) when a GitHub Release is published. Register the pending
# publisher on PyPI as: project vahtian-epinet, owner heidihelena, repo epinet,
# workflow publish.yml, environment pypi.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'          # pushing a version tag (e.g. v0.4.0) publishes that version
  workflow_dispatch:  # manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
